    // ==============================================================
    //  PACHINKO GAME ENGINE
    // ==============================================================
    let pachinkoState = null;

    // Board config — all positions RELATIVE to the board (which starts at x=500 in the screen)
    const PACH = {
      boardX: 500,       // board left edge in screen coords
      boardW: 1420,
      boardH: 1080,
      ballSize: 22,      // smaller pixel art balls (~35% reduction: 165 * 0.65 ≈ 107 for display, but physics uses 22)
      ballDisplay: 107,  // visual size of the ball (165 * 0.65)
      gravity: 0.11,     // lighter gravity — balls float and bounce more (Peggle-like)
      bounce: 0.55,
      friction: 0.988,   // less friction so balls keep lateral momentum
      pegRadius: 9,      // slightly bigger pegs for easier bouncing
      pegBounce: 0.85,   // bouncier pegs — more elastic (Peggle feel)
      ballsPerDrawing: 6, // total balls per USER (distributed across their drawings)
    };

    // Hole definitions: type, points, width, color class
    // Layout: from left to right across the board width
    function getPachinkoHoles() {
      // 9 holes — wider and easier to read
      // Pattern: zero, good, bad, small, JACKPOT, small, bad, good, zero
      const holes = [
        { type: 'small',   pts: 50,    cls: 'hole-small',   label: '+50' },
        { type: 'good',    pts: 200,   cls: 'hole-good',    label: '+200' },
        { type: 'bad',     pts: -300,  cls: 'hole-bad',     label: '-300 ☠️' },
        { type: 'small',   pts: 75,    cls: 'hole-small',   label: '+75' },
        { type: 'jackpot', pts: 1000,  cls: 'hole-jackpot', label: '🎰 x1000' },
        { type: 'small',   pts: 75,    cls: 'hole-small',   label: '+75' },
        { type: 'bad',     pts: -300,  cls: 'hole-bad',     label: '-300 ☠️' },
        { type: 'good',    pts: 200,   cls: 'hole-good',    label: '+200' },
        { type: 'small',   pts: 50,    cls: 'hole-small',   label: '+50' },
      ];
      const totalHoles = holes.length;
      const totalWidth = PACH.boardW - 20; // 10px margin each side
      // bad = 80px, jackpot = 90px, others fill remaining space
      const badCount = holes.filter(h => h.type === 'bad').length;
      const jackpotCount = holes.filter(h => h.type === 'jackpot').length;
      const fixedWidth = badCount * 80 + jackpotCount * 90;
      const remainingWidth = totalWidth - fixedWidth;
      const normalCount = totalHoles - badCount - jackpotCount;
      const normalWidth = Math.floor(remainingWidth / normalCount);
      
      let x = 10;
      return holes.map(h => {
        let w;
        if (h.type === 'bad') w = 80;
        else if (h.type === 'jackpot') w = 90;
        else w = normalWidth;
        const hole = { ...h, x, w };
        x += w;
        return hole;
      });
    }

    function generatePegs() {
      const pegs = [];
      const cols = 13;     // fewer columns (was 18) — more horizontal space
      const rows = 10;     // fewer rows (was 14) — more vertical space between bounces
      const startY = 90;
      const endY = PACH.boardH - 130;
      const rowSpacing = (endY - startY) / rows;
      const colSpacing = PACH.boardW / (cols + 1);
      
      for (let r = 0; r < rows; r++) {
        const offset = (r % 2 === 0) ? 0 : colSpacing / 2;
        const numCols = (r % 2 === 0) ? cols : cols - 1;
        for (let c = 0; c < numCols; c++) {
          const px = offset + (c + 1) * colSpacing;
          const py = startY + r * rowSpacing;
          // Add slight randomness for natural look
          const jitterX = (Math.random() - 0.5) * 10;
          const jitterY = (Math.random() - 0.5) * 6;
          pegs.push({ x: px + jitterX, y: py + jitterY });
        }
      }
      return pegs;
    }

    function buildPachinkoBoard() {
      const board = document.getElementById('pachinko-board');
      board.innerHTML = '';
      
      // Generate and render pegs
      const pegs = generatePegs();
      pegs.forEach(p => {
        const el = document.createElement('div');
        el.className = 'pachinko-peg';
        el.style.left = (p.x - PACH.pegRadius) + 'px';
        el.style.top = (p.y - PACH.pegRadius) + 'px';
        board.appendChild(el);
      });
      
      // Generate and render holes
      const holes = getPachinkoHoles();
      holes.forEach((h, i) => {
        const el = document.createElement('div');
        el.className = 'pachinko-hole ' + h.cls;
        el.style.left = h.x + 'px';
        el.style.width = h.w + 'px';
        el.innerHTML = '<div class="hole-label">' + h.label + '</div>';
        el.id = 'pach-hole-' + i;
        board.appendChild(el);
        
        // Add small divider walls between holes
        if (i < holes.length - 1) {
          const wall = document.createElement('div');
          wall.className = 'pachinko-wall';
          wall.style.left = (h.x + h.w - 2) + 'px';
          wall.style.height = '85px';
          board.appendChild(wall);
        }
      });
      
      return { pegs, holes };
    }

    function createPachinkoBall(drawing, ballIndex) {
      const board = document.getElementById('pachinko-board');
      // Create a mini version of the drawing's canvas
      const container = document.createElement('div');
      container.style.cssText = `position:absolute;width:${PACH.ballDisplay}px;height:${PACH.ballDisplay}px;pointer-events:none;z-index:50;will-change:transform;`;
      
      // Clone the canvas at smaller size
      const origCanvas = drawing.el.querySelector('canvas');
      const miniCanvas = document.createElement('canvas');
      miniCanvas.width = 16; miniCanvas.height = 16;
      miniCanvas.style.cssText = `width:${PACH.ballDisplay}px;height:${PACH.ballDisplay}px;image-rendering:pixelated;`;
      const ctx = miniCanvas.getContext('2d');
      ctx.drawImage(origCanvas, 0, 0);
      container.appendChild(miniCanvas);
      
      // Nick label under ball
      const nick = document.createElement('div');
      nick.style.cssText = 'color:#fff;font-size:11px;font-weight:700;text-align:center;text-shadow:1px 1px 0 #000;white-space:nowrap;margin-top:-2px;width:120px;margin-left:' + ((PACH.ballDisplay - 120)/2) + 'px;overflow:hidden;text-overflow:ellipsis;';
      nick.textContent = drawing.user;
      container.appendChild(nick);
      
      board.appendChild(container);
      
      // Random drop position across the top, with some spread
      const dropX = 100 + Math.random() * (PACH.boardW - 200);
      
      return {
        el: container,
        user: drawing.user,
        x: dropX,
        y: -20 - ballIndex * 5,
        vx: (Math.random() - 0.5) * 2,
        vy: 0.5 + Math.random() * 0.5,
        rot: 0,
        rotSpeed: (Math.random() - 0.5) * 6,
        radius: PACH.ballSize,
        alive: true,
        scored: false,
      };
    }

    function triggerPachinko() {
      if (activeEvent === 'pachinko') { endEvent(); return; }
      if (isEventActive()) endEvent();
      if (drawings.length < 2) { finishReward(); return; }
      
      activeEvent = 'pachinko';
      rainMode = false;
      forceAllSubsToEvent();
      
      // Hide normal drawings
      drawings.forEach(d => { d.el.style.opacity = 0; });
      
      // Build the board
      const { pegs, holes } = buildPachinkoBoard();
      
      // Show HUD
      document.getElementById('pachinko-hud').style.display = 'block';
      document.getElementById('pachinko-timer-fill').style.width = '100%';
      
      // Group drawings by user
      const userDrawings = {};
      drawings.forEach(d => {
        if (!userDrawings[d.user]) userDrawings[d.user] = [];
        userDrawings[d.user].push(d);
      });
      
      // --- Balance: each USER gets the same total balls regardless of drawing count ---
      // All drawings participate visually, balls distributed evenly across them
      const BALLS_PER_USER = PACH.ballsPerDrawing; // 6 balls per user, always
      
      // Create ball queue: distribute BALLS_PER_USER evenly across each user's drawings
      const ballQueue = [];
      for (const [user, uDrawings] of Object.entries(userDrawings)) {
        const count = uDrawings.length;
        const base = Math.floor(BALLS_PER_USER / count);
        const remainder = BALLS_PER_USER % count;
        // Shuffle so the "extra" balls go to random drawings each time
        const shuffledDrawings = uDrawings.sort(() => Math.random() - 0.5);
        shuffledDrawings.forEach((d, idx) => {
          // First 'remainder' drawings get one extra ball
          const balls = base + (idx < remainder ? 1 : 0);
          for (let b = 0; b < balls; b++) {
            ballQueue.push(d);
          }
        });
      }
      // Shuffle the ball queue so users are interleaved
      for (let i = ballQueue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ballQueue[i], ballQueue[j]] = [ballQueue[j], ballQueue[i]];
      }
      
      // Initialize scores — each user always gets BALLS_PER_USER total
      const scores = {};
      for (const user of Object.keys(userDrawings)) {
        scores[user] = { pts: 0, total: BALLS_PER_USER, remaining: BALLS_PER_USER };
      }
      
      pachinkoState = {
        pegs,
        holes,
        balls: [],
        ballQueue,
        ballQueueIdx: 0,
        scores,
        totalBalls: ballQueue.length,
        scoredBalls: 0,        // track how many balls have landed in holes
        startTime: Date.now(),
        lastDropTime: 0,
        dropInterval: 1500,    // fixed 1.5s between drops — nice visual rhythm
        phase: 'dropping',     // 'dropping' | 'settling' | 'finished'
      };
      
      updatePachinkoScores();
      
      // Progress bar: updates based on balls remaining, not time
      const progressInterval = setInterval(() => {
        if (!pachinkoState || activeEvent !== 'pachinko') { clearInterval(progressInterval); return; }
        const pct = Math.max(0, 1 - pachinkoState.scoredBalls / pachinkoState.totalBalls);
        document.getElementById('pachinko-timer-fill').style.width = (pct * 100) + '%';
      }, 200);
    }

    function pachinkoTick(dt, now) {
      if (!pachinkoState) return;
      const st = pachinkoState;
      
      // Drop new balls
      if (st.phase === 'dropping' && st.ballQueueIdx < st.ballQueue.length) {
        if (now - st.lastDropTime > st.dropInterval) {
          const drawing = st.ballQueue[st.ballQueueIdx];
          const ball = createPachinkoBall(drawing, st.ballQueueIdx);
          st.balls.push(ball);
          st.lastDropTime = now;
          st.ballQueueIdx++;
          
          // Switch to settling when all balls dropped
          if (st.ballQueueIdx >= st.ballQueue.length) {
            st.phase = 'settling';
            // Safety: if balls get stuck, force end after 15s
            st.settleTimeout = setTimeout(() => {
              if (pachinkoState && pachinkoState.phase !== 'finished') {
                pachinkoState.phase = 'finished';
                showPachinkoWinner();
              }
            }, 15000);
          }
        }
      }
      
      // Physics for all active balls
      for (let i = st.balls.length - 1; i >= 0; i--) {
        const b = st.balls[i];
        if (!b.alive) continue;
        
        // Gravity
        b.vy += PACH.gravity * dt;
        
        // Apply velocity
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        
        // Friction
        b.vx *= PACH.friction;
        
        // Rotation
        b.rot += b.rotSpeed * dt;
        b.rotSpeed *= 0.998;
        
        // Wall bounces (left and right of board)
        if (b.x < b.radius) { b.x = b.radius; b.vx = Math.abs(b.vx) * PACH.bounce; b.rotSpeed += 2; }
        if (b.x > PACH.boardW - b.radius) { b.x = PACH.boardW - b.radius; b.vx = -Math.abs(b.vx) * PACH.bounce; b.rotSpeed -= 2; }
        
        // Top bounce
        if (b.y < b.radius) { b.y = b.radius; b.vy = Math.abs(b.vy) * 0.3; }
        
        // Peg collisions
        for (const peg of st.pegs) {
          const dx = b.x - peg.x;
          const dy = b.y - peg.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = b.radius + PACH.pegRadius;
          if (dist < minDist && dist > 0) {
            // Push ball out
            const nx = dx / dist;
            const ny = dy / dist;
            b.x = peg.x + nx * minDist;
            b.y = peg.y + ny * minDist;
            
            // Reflect velocity
            const dot = b.vx * nx + b.vy * ny;
            b.vx -= 2 * dot * nx * PACH.pegBounce;
            b.vy -= 2 * dot * ny * PACH.pegBounce;
            
            // Peggle-style: strong lateral scatter + slight upward pop
            b.vx += (Math.random() - 0.5) * 2.5;
            b.vy += (Math.random() - 0.5) * 1.2 - 0.3; // bias upward slightly
            
            b.rotSpeed = (Math.random() - 0.5) * 12;
          }
        }
        
        // Ball-to-ball collisions (lighter)
        for (let j = i - 1; j >= 0; j--) {
          const o = st.balls[j];
          if (!o.alive) continue;
          const dx = b.x - o.x;
          const dy = b.y - o.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = b.radius * 2;
          if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = (minDist - dist) / 2;
            b.x += nx * overlap;
            b.y += ny * overlap;
            o.x -= nx * overlap;
            o.y -= ny * overlap;
            const dvx = b.vx - o.vx;
            const dvy = b.vy - o.vy;
            const dot = dvx * nx + dvy * ny;
            if (dot > 0) {
              b.vx -= dot * nx * 0.4;
              b.vy -= dot * ny * 0.4;
              o.vx += dot * nx * 0.4;
              o.vy += dot * ny * 0.4;
            }
          }
        }
        
        // Divider wall collisions
        st.holes.forEach((h, idx) => {
          if (idx < st.holes.length - 1) {
            const wallX = h.x + h.w - 2;
            const wallTop = PACH.boardH - 85 - 70;
            const wallBottom = PACH.boardH - 70;
            if (b.y > wallTop && b.y < wallBottom) {
              if (Math.abs(b.x - wallX) < b.radius + 2) {
                if (b.x < wallX) { b.x = wallX - b.radius - 2; b.vx = -Math.abs(b.vx) * 0.5; }
                else { b.x = wallX + b.radius + 2; b.vx = Math.abs(b.vx) * 0.5; }
              }
            }
          }
        });
        
        // Check if ball entered a hole (bottom of board)
        if (b.y > PACH.boardH - 80 && !b.scored) {
          // Find which hole
          for (let hi = 0; hi < st.holes.length; hi++) {
            const h = st.holes[hi];
            if (b.x >= h.x && b.x < h.x + h.w) {
              b.scored = true;
              b.alive = false;
              
              // Score it
              st.scores[b.user].pts += h.pts;
              if (st.scores[b.user].pts < 0) st.scores[b.user].pts = 0;
              st.scores[b.user].remaining--;
              
              // Visual effects
              const isGood = h.pts > 0;
              const isBad = h.pts < 0;
              
              if (isGood) {
                b.el.classList.add('pachinko-gold-glow');
                playSound(SFX.gold, 1.0);
                const holeEl = document.getElementById('pach-hole-' + hi);
                if (holeEl) {
                  holeEl.classList.remove('hole-flash-gold');
                  void holeEl.offsetWidth;
                  holeEl.classList.add('hole-flash-gold');
                  setTimeout(() => holeEl.classList.remove('hole-flash-gold'), 500);
                }
              } else if (isBad) {
                b.el.classList.add('pachinko-bad-glow');
                playSound(SFX.bad, 1.0);
                const holeEl = document.getElementById('pach-hole-' + hi);
                if (holeEl) {
                  holeEl.classList.remove('hole-flash-bad');
                  void holeEl.offsetWidth;
                  holeEl.classList.add('hole-flash-bad');
                  setTimeout(() => holeEl.classList.remove('hole-flash-bad'), 500);
                }
              }
              
              // Remove ball element after animation
              setTimeout(() => { if (b.el && b.el.parentNode) b.el.remove(); }, 700);
              
              st.scoredBalls++;
              updatePachinkoScores();
              
              // Game over when all balls have scored
              if (st.scoredBalls >= st.totalBalls && st.phase !== 'finished') {
                st.phase = 'finished';
                // Small delay so the last ball's animation plays
                setTimeout(() => { showPachinkoWinner(); }, 800);
              }
              break;
            }
          }
          
          // If somehow missed all holes (off-screen), just kill it
          if (!b.scored && b.y > PACH.boardH + 50) {
            b.scored = true;
            b.alive = false;
            st.scoredBalls++;
            if (b.el && b.el.parentNode) b.el.remove();
            // Check if game is done
            if (st.scoredBalls >= st.totalBalls && st.phase !== 'finished') {
              st.phase = 'finished';
              setTimeout(() => { showPachinkoWinner(); }, 800);
            }
          }
        }
        
        // Update visual position
        if (b.alive) {
          const displayOffset = PACH.ballDisplay / 2;
          b.el.style.transform = `translate3d(${b.x - displayOffset}px, ${b.y - displayOffset}px, 0) rotate(${b.rot}deg)`;
        }
      }
      
      // Clean up dead balls from array periodically
      if (st.balls.length > 100) {
        st.balls = st.balls.filter(b => b.alive);
      }
    }

    function updatePachinkoScores() {
      if (!pachinkoState) return;
      const list = document.getElementById('pachinko-scores-list');
      const scores = pachinkoState.scores;
      
      // Sort by points descending
      const sorted = Object.entries(scores).sort((a, b) => b[1].pts - a[1].pts);
      
      let html = '';
      sorted.forEach(([user, data], idx) => {
        const rankCls = idx === 0 ? 'top-1' : idx === 1 ? 'top-2' : idx === 2 ? 'top-3' : '';
        const rankEmoji = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx + 1);
        const ptsCls = data.pts < 0 ? 'negative' : '';
        const ptsStr = (data.pts >= 0 ? '+' : '') + data.pts;
        html += `<div class="pachinko-score-row ${rankCls}">
          <div class="pachinko-score-rank">${rankEmoji}</div>
          <div class="pachinko-score-name">${user}</div>
          <div class="pachinko-score-pts ${ptsCls}">${ptsStr}</div>
          <div class="pachinko-score-remaining">🎱${data.remaining}</div>
        </div>`;
      });
      list.innerHTML = html;
    }

    function showPachinkoWinner() {
      if (!pachinkoState) return;
      const scores = pachinkoState.scores;
      const sorted = Object.entries(scores).sort((a, b) => b[1].pts - a[1].pts);
      
      if (sorted.length === 0) { endEvent(); return; }
      
      const topScore = sorted[0][1].pts;
      // Find all winners (ties)
      const winners = sorted.filter(([u, d]) => d.pts === topScore);
      
      const winnerEl = document.getElementById('pachinko-winner');
      const nameEl = document.getElementById('pachinko-winner-name');
      const scoreEl = document.getElementById('pachinko-winner-score');
      
      if (winners.length === 1) {
        nameEl.textContent = '🎰 ' + winners[0][0].toUpperCase() + ' 🎰';
      } else {
        nameEl.textContent = winners.map(w => w[0].toUpperCase()).join(' & ');
      }
      scoreEl.textContent = (topScore >= 0 ? '+' : '') + topScore + ' PTS';
      
      playSound(SFX.win, 1.0);
      winnerEl.style.display = 'flex';
      
      // End everything after 8 seconds
      setTimeout(() => {
        winnerEl.style.display = 'none';
        endEvent();
      }, 8000);
    }

    function cleanupPachinko() {
      // Remove all ball elements
      if (pachinkoState) {
        pachinkoState.balls.forEach(b => { if (b.el && b.el.parentNode) b.el.remove(); });
        if (pachinkoState.settleTimeout) clearTimeout(pachinkoState.settleTimeout);
      }
      pachinkoState = null;
      document.getElementById('pachinko-hud').style.display = 'none';
      document.getElementById('pachinko-board').innerHTML = '';
      document.getElementById('pachinko-scores-list').innerHTML = '';
      document.getElementById('pachinko-winner').style.display = 'none';
      // Restore drawings visibility
      drawings.forEach(d => { d.el.style.opacity = 1; });
    }

    // --- FIGHT ---
    function triggerFight() {
      if (activeEvent === 'fight') { endEvent(); return; }
      if (isEventActive()) endEvent();
      forceAllSubsToEvent();
      const eligible = drawings.filter(d => !d.el.classList.contains('showcase')&&!d.el.classList.contains('waiting')&&!d.el.classList.contains('spiral-to-lane'));
      if (eligible.length < 4) { finishReward(); return; }
      
      activeEvent = 'fight'; rainMode = false;

      // --- Balance: all drawings participate, each with 1 HP ---
      // Fairness is enforced in fightTick: targets are chosen per-USER first,
      // then a random drawing of that user is hit. This way a user with 9 drawings
      // has the same chance of being targeted as a user with 1 drawing.

      // Shuffle and split into two teams
      const shuffled = eligible.sort(() => Math.random()-0.5);
      const half = Math.ceil(shuffled.length/2);
      const leftTeam = shuffled.slice(0, half);
      const rightTeam = shuffled.slice(half);

      // Every drawing gets 1 HP — simple and visual
      leftTeam.forEach((d, i) => {
        d.fightSide = 'left'; d.fightDead = false;
        d.el.classList.remove('jumping');
        d.el.classList.add('fight-red');
        d.fightHP = 1;
        d.fightMaxHP = 1;
        d.fightSlotX = 80 + (i % 3) * 120;
        d.fightSlotY = 150 + Math.floor(i / 3) * 180 + (i%2)*30;
        d.fightPhase = Math.random()*7;
      });
      rightTeam.forEach((d, i) => {
        d.fightSide = 'right'; d.fightDead = false;
        d.el.classList.remove('jumping');
        d.el.classList.add('fight-blue');
        d.fightHP = 1;
        d.fightMaxHP = 1;
        d.fightSlotX = 1550 + (i % 3) * 120;
        d.fightSlotY = 150 + Math.floor(i / 3) * 180 + (i%2)*30;
        d.fightPhase = Math.random()*7;
      });

      // Total team HP = sum of individual HPs
      const leftTotalHP = leftTeam.reduce((s,d) => s + d.fightHP, 0);
      const rightTotalHP = rightTeam.reduce((s,d) => s + d.fightHP, 0);

      // Kill interval scales with fighter count: more fighters = faster hits
      // Base interval ~1.5s, scales down with more fighters, min 0.6s
      const totalFighters = eligible.length;
      const baseInterval = Math.max(600, 1500 - totalFighters * 50);

      fightState = {
        phase: 'lineup',
        leftTeam, rightTeam,
        leftTotalHP: leftTotalHP, rightTotalHP: rightTotalHP,
        leftMaxHP: leftTotalHP, rightMaxHP: rightTotalHP,
        nextHitTime: 0,
        baseInterval: baseInterval,
        wilhelmPlayed: false,
        hitCount: 0
      };

      // Show HUD
      const hud = document.getElementById('fight-hud');
      hud.style.display = 'block';
      document.getElementById('hp-left').style.width = '100%';
      document.getElementById('hp-right').style.width = '100%';
      document.getElementById('hp-label-left').textContent = `🔴 EQUIPO ROJO (${leftTeam.length})`;
      document.getElementById('hp-label-right').textContent = `🔵 EQUIPO AZUL (${rightTeam.length})`;
      document.getElementById('fight-text').style.display = 'none';
      document.getElementById('fight-winner-text').style.display = 'none';


      // A los 5s de prepararse, arranca el countdown 3, 2, 1, FIGHT!
      setTimeout(() => {
        if (activeEvent !== 'fight') return;
        let count = 3;
        const ft = document.getElementById('fight-text');
        
        function tickCountdown() {
          // Si el evento se canceló en el medio, cortamos acá
          if (activeEvent !== 'fight') {
             ft.style.display = 'none';
             return;
          }
          
          ft.style.display = 'block';
          
          // Truco para reiniciar la animación CSS en cada cambio de texto
          ft.style.animation = 'none';
          void ft.offsetWidth; // Forzamos un reflow
          
          if (count > 0) {
            ft.textContent = count;
            ft.style.animation = 'fightPulse 0.3s ease-in-out 1'; // 1 latido por número
            count--;
            setTimeout(tickCountdown, 1000);
          } else if (count === 0) {
            ft.textContent = 'FIGHT!';
            ft.style.animation = 'fightPulse 0.3s ease-in-out 3';
            playSound(SFX.fight, 1.0);
            count--;
            setTimeout(tickCountdown, 1500); // Espera 1.5s leyendo el FIGHT y arranca
          } else {
            // Se esconde el texto y arranca a bajar vida
            ft.style.display = 'none';
            if (fightState) {
              fightState.phase = 'fighting';
              fightState.nextHitTime = Date.now() + 500 + Math.random() * fightState.baseInterval;
            }
          }
        }
        
        tickCountdown();
      }, 5000);
    }

    function fightTick(dt) {
      if (!fightState || fightState.phase !== 'fighting') return;
      const now = Date.now();
      
      if (now >= fightState.nextHitTime) {
        const leftAlive = fightState.leftTeam.filter(d => !d.fightDead);
        const rightAlive = fightState.rightTeam.filter(d => !d.fightDead);
        if (leftAlive.length === 0 || rightAlive.length === 0) { finishFight(); return; }

        // Pick attacker side randomly, the other side takes damage
        const attackSide = Math.random() < 0.5 ? 'left' : 'right';
        const defenders = attackSide === 'left' ? rightAlive : leftAlive;
        
        // --- BALANCE: pick a USER first (equal chance per user), then a random drawing of that user ---
        // This prevents users with many drawings from "tanking" more hits
        const defenderUsers = [...new Set(defenders.map(d => d.user))];
        const targetUser = defenderUsers[Math.floor(Math.random() * defenderUsers.length)];
        const targetDrawings = defenders.filter(d => d.user === targetUser);
        const target = targetDrawings[Math.floor(Math.random() * targetDrawings.length)];
        fightState.hitCount++;
        
        // 25% chance the hit is blocked (shield sound, no damage)
        const blocked = Math.random() < 0.25;
        
        if (blocked) {
          playSound(SFX.shield, 1.0);
          target.el.style.filter = 'brightness(2)';
          setTimeout(() => { if (!target.fightDead) target.el.style.filter = ''; }, 100);
        } else {
          target.fightHP--;
          playSound(SFX.sword, 1.0);

          target.el.style.filter = 'brightness(3)';
          setTimeout(() => { if (!target.fightDead) target.el.style.filter = ''; }, 150);

          // Update team total HP
          if (attackSide === 'left') fightState.rightTotalHP--;
          else fightState.leftTotalHP--;

          // Update HP bars
          document.getElementById('hp-left').style.width = Math.max(0, fightState.leftTotalHP / fightState.leftMaxHP * 100) + '%';
          document.getElementById('hp-right').style.width = Math.max(0, fightState.rightTotalHP / fightState.rightMaxHP * 100) + '%';

          // Did the target die?
          if (target.fightHP <= 0) {
            target.fightDead = true;
            spawnExplosion(target.x, target.y);
            target.el.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
            target.el.style.transform += ' scale(1.5)';
            target.el.style.opacity = 0;
            target.el.style.filter = '';
            setTimeout(() => { target.el.style.transition = ''; }, 350);

            // Wilhelm scream — once per fight, on a random death
            // Guaranteed to play at least once: 35% on each kill after hit 3,
            // forced on the final kill if it still hasn't played
            const leftRemain = fightState.leftTeam.filter(d => !d.fightDead).length;
            const rightRemain = fightState.rightTeam.filter(d => !d.fightDead).length;
            const isFinalKill = (leftRemain === 0 || rightRemain === 0);
            if (!fightState.wilhelmPlayed && (isFinalKill || (fightState.hitCount > 3 && Math.random() < 0.35))) {
              playSound(SFX.wilhelm, 1.0);
              fightState.wilhelmPlayed = true;
            }

            const defSide = attackSide === 'left' ? '🔵' : '🔴';

            if (isFinalKill) {
              finishFight();
              return;
            }
          } else {
            const defSide = attackSide === 'left' ? '🔵' : '🔴';
          }
        }

        // Next hit: random interval around baseInterval
        fightState.nextHitTime = now + fightState.baseInterval * (0.5 + Math.random());
      }
    }

    function finishFight() {
      if (!fightState) return;
      if (eventTimer) { clearTimeout(eventTimer); eventTimer = null; }
      fightState.phase = 'victory';

      const leftRemain = fightState.leftTeam.filter(d => !d.fightDead);
      const rightRemain = fightState.rightTeam.filter(d => !d.fightDead);
      const winningSide = leftRemain.length > 0 ? 'left' : 'right';
      const winners = winningSide === 'left' ? leftRemain : rightRemain;
      const sideEmoji = winningSide === 'left' ? '🔴' : '🔵';
      const sideName = winningSide === 'left' ? 'ROJO' : 'AZUL';

      playSound(SFX.win, 1.0);
      // Show winner text
      const wt = document.getElementById('fight-winner-text');
      wt.textContent = `🏆 EQUIPO ${sideName} GANA!`;
      wt.style.display = 'block';

      // Position winners in center for victory dance - grid layout for many
      const count = winners.length;
      if (count <= 4) {
        // Single row, well spaced
        const spacing = Math.min(220, 1400 / count);
        winners.forEach((d, i) => {
          d.el.style.opacity = 1;
          d.x = 960 - (count-1)*spacing/2 + i*spacing;
          d.y = 450;
        });
      } else {
        // Grid: 2 rows
        const cols = Math.ceil(count / 2);
        const spacingX = Math.min(220, 1400 / cols);
        const spacingY = 200;
        winners.forEach((d, i) => {
          d.el.style.opacity = 1;
          const row = Math.floor(i / cols);
          const col = i % cols;
          const rowCount = row === 0 ? cols : count - cols;
          d.x = 960 - (rowCount-1)*spacingX/2 + col*spacingX;
          d.y = 380 + row * spacingY;
        });
      }

      // After 8s of victory dance, end the event
      setTimeout(() => {
        document.getElementById('fight-hud').style.display = 'none';
        // Restore all (including "dead" ones)
        drawings.forEach(d => { d.fightDead = false; d.el.style.opacity = 1; });
        endEvent();
      }, 8000);
    }

    // ==============================================================
    //  RANDOM EVENT SCHEDULER
    // ==============================================================
    // Events triggered by reward redemptions or admin commands only.

    // ==============================================================
    // ==============================================================

    function toggleRain() {
      rainMode = !rainMode;
      drawings.forEach(d => {
        if (rainMode) { d.rainOriginX = d.x; d.rainSpeed = 0.8 + Math.random() * 2; d.rainPhase = Math.random() * 7; }
        else { d.y = LANES[d.lane]; }
      });
    }

    // ==============================================================

    connectTwitch();
    connectBot();
    if (FEAT_PIXEL) connectPubSub();

    // Ocultar el container del pixel art si está desactivado
    if (!FEAT_PIXEL) {
      document.getElementById('container').style.display = 'none';
      document.getElementById('fight-hud').style.display = 'none';
    }
  </script>
</body>
